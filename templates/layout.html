<!DOCTYPE html>
<html>

<head>
  <title>Album Reviews</title>
</head>

<body>
  <h1>Album Reviews</h1>
  {% if session.username %}
  <p>
    You are logged in as {{ session.username }}
  </p>
  {% endif %}

  <p>
    <a href="/login">Log in</a>
    <a href="/register">Register</a>
    <a href="/logout">Log out</a>
  </p>

  {% for message in get_flashed_messages() %}
  <div class="info">
    {{ message }}
  </div>
  {% endfor %}

  {% block content %}{% endblock %}
</body>

</html>
