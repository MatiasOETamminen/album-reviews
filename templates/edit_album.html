{% extends "layout.html" %}

{% block title %}Edit album{% endblock %}

{% block content %}

<form action="/{{ artist }}/{{ album }}/edit" method="post">
  <p>
    <label for="songlist">Song list</label>: <br />
    <textarea name="songlist" id="description" rows="15" cols="60" maxlength="1500" required>{{ songlist }}</textarea>
  </p>
  <p>
    <label for="genres">Add genres</label>: (separate by semicolon)<br />
    <input type="text" name="genres" id="genres" maxlength="1000" />
  </p>
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" value="Submit" />
</form>

{% endblock %}
