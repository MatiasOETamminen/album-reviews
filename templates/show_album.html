{% extends "layout.html" %}

{% block content %}
<h2 style="text-transform: uppercase">{{ artist }} - {{ album }}</h2>
<p>
  {{ year }}
</p>
<p>
  {{ songlist | show_lines }}
</p>
<p>
{% for genre in genres %}
  <li>{{ genre }}</li>
{% endfor %}

{% if session.user_id %}
<p>
  <a href="/edit/{{ artist }}/{{ album }}">Edit songlist</a>
</p>
{% endif %}
{% endblock %}
